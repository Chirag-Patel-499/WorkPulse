                    <!-- Screenshot Preview -->

        const confirmStopSessionButton = document.getElementById('confirm-stop-session-button');

        // Utility Functions
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return [h, m, s].map(v => v < 10 ? '0' + v : v).join(':');
        }

        // New utility function to parse Django's DurationField string format
        function parseDjangoDurationToSeconds(durationString) {
            if (!durationString) return 0;

            // Example formats: "0:00:00", "1 day, 0:00:00", "1 day, 1:02:03.456000"
            let totalSeconds = 0;
            const parts = durationString.split(', ');

            if (parts.length > 1) { // Contains days
                const daysPart = parts[0];
                const daysMatch = daysPart.match(/(\d+)\s+day/);
                if (daysMatch) {
                    totalSeconds += parseInt(daysMatch[1]) * 24 * 3600;
                }
                durationString = parts[1]; // Remaining is time part
            }

            const timeParts = durationString.split(':');
            if (timeParts.length === 3) { // HH:MM:SS.microseconds or HH:MM:SS
                totalSeconds += parseInt(timeParts[0]) * 3600;
                totalSeconds += parseInt(timeParts[1]) * 60;
                totalSeconds += parseFloat(timeParts[2]);
            } else if (timeParts.length === 2) { // MM:SS (less common for DurationField but handle)
                totalSeconds += parseInt(timeParts[0]) * 60;
                totalSeconds += parseFloat(timeParts[1]);
            } else if (timeParts.length === 1) { // SS (less common)
                totalSeconds += parseFloat(timeParts[0]);
            }
            return totalSeconds;
        }

        function updateSessionStatsDisplay() {
            if (currentSession) {
                const totalSeconds = (new Date(currentSession.end_time || Date.now()).getTime() - new Date(currentSession.start_time).getTime()) / 1000;
                const activeSeconds = parseDjangoDurationToSeconds(currentSession.active_time);
                const idleSeconds = parseDjangoDurationToSeconds(currentSession.idle_time);
                
                totalTimeSpan.textContent = formatDuration(totalSeconds);
                activeTimeSpan.textContent = formatDuration(activeSeconds);
            } else {
                totalTimeSpan.textContent = '0s';
                activeTimeSpan.textContent = '0s';
            }
        }

        function updateSessionTimer() {
            if (currentSession && currentSession.start_time) {
                const now = Date.now();
                const startTime = new Date(currentSession.start_time).getTime();
                const elapsedSeconds = Math.floor((now - startTime) / 1000);
                sessionTimerDisplay.textContent = formatDuration(elapsedSeconds);
            } else {
                sessionTimerDisplay.textContent = '00:00:00';
            }
        }

        function showDashboard() {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            dashboardContent.classList.remove('hidden'); // Show dashboard content
            adminReportScreen.classList.add('hidden'); // Hide admin report screen

            } else {
                adminReportButton.classList.add('hidden');
            }

            }

            adminReportScreen.classList.remove('hidden'); // Show admin report screen

            dashboardScreen.classList.add('hidden');
            dashboardContent.classList.add('hidden'); // Hide dashboard content
            adminReportScreen.classList.add('hidden'); // Hide admin report screen
            currentUser = null;
            currentSession = null;
            clearInterval(sessionTimerInterval);
            clearInterval(activityTrackerInterval);
            clearInterval(screenshotInterval);

            taskList.innerHTML = '';

        // API Calls
        async function apiFetch(url, method = 'GET', data = null) {
            const options = {
                method: method,
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                },
            };
            if (data) {
                if (data instanceof FormData) {
                    options.body = data;
                } else {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                }
            }
            const response = await fetch(`${API_BASE_URL}${url}`, options);
            if (!response.ok) {
                let errorMessage = `Server Error: ${response.status} ${response.statusText}`;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    const errorData = await response.json();
                    errorMessage = errorData.error || errorMessage;
                }
                throw new Error(errorMessage);
            }
            return response.json();
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function fetchDashboardData() {
            if (!currentUser) return;
            try {
                const data = await apiFetch(`/dashboard?user_id=${currentUser.id}`);
                currentUser = data.user; // Update user data if needed
                currentSession = data.current_session;
                
                // Populate tasks
                taskSelect.innerHTML = '<option value="">No Task Selected</option>';
                data.tasks.forEach(task => {
                    const option = document.createElement('option');
                    option.value = task.id;
                    option.textContent = task.title;
                    taskSelect.appendChild(option);
                });
                renderTaskList(data.tasks);

                if (currentSession) {
                    taskSelect.value = currentSession.task ? currentSession.task.id : '';
                    startSessionButton.classList.add('hidden');
                    stopSessionButton.classList.remove('hidden');
                    sessionTimerInterval = setInterval(updateSessionTimer, 1000);
                    updateSessionTimer();
                    updateSessionStatsDisplay();
                    if (data.last_screenshot && data.last_screenshot.image) {
                        lastScreenshotImg.src = data.last_screenshot.image;
                        lastScreenshotImg.classList.remove('hidden');
                        noScreenshotMessage.classList.add('hidden');
                    } else {
                        lastScreenshotImg.classList.add('hidden');
                        noScreenshotMessage.classList.remove('hidden');
                    }
                    // Start screenshot capture if not already running
                    if (!mediaStream) {
                        startScreenCapture();
                    }
                } else {
                    startSessionButton.classList.remove('hidden');
                    stopSessionButton.classList.add('hidden');
                    clearInterval(sessionTimerInterval);
                    sessionTimerDisplay.textContent = '00:00:00';
                    lastScreenshotImg.classList.add('hidden');
                    noScreenshotMessage.classList.remove('hidden');
                    updateSessionStatsDisplay();
                }
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                alert('Error fetching dashboard data: ' + error.message);
            }
        }

        async function fetchAdminReportData() {
            try {
                const data = await apiFetch('/admin-report');
                renderAdminReportTable(data);
            } catch (error) {
                console.error('Error fetching admin report data:', error);
                alert('Error fetching admin report: ' + error.message);

            adminReportTableBody.innerHTML = '';

                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatDuration(parseDjangoDurationToSeconds(user.total_idle_time))}</td>

                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${user.last_session_end ? new Date(user.last_session_end).toLocaleString() : 'N/A'}</td>

        async function login() {
            const username = usernameInput.value.trim();
            if (!username) {
                loginError.textContent = 'Username cannot be empty.';
                loginError.classList.remove('hidden');
                return;
            }
            loginError.classList.add('hidden');
            try {
                const data = await apiFetch('/login', 'POST', { username });
                currentUser = data;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                showDashboard();
            } catch (error) {
                console.error('Login error:', error);
                loginError.textContent = 'Login failed: ' + error.message;
                loginError.classList.remove('hidden');
            }
        }

        async function startSession() {
            if (!currentUser) return;
            const selectedTaskId = taskSelect.value;
            try {
                const data = await apiFetch('/start-session', 'POST', { 
                    user_id: currentUser.id, 
                    task_id: selectedTaskId || null 
                });
                currentSession = data;
                startSessionButton.classList.add('hidden');
                stopSessionButton.classList.remove('hidden');
                sessionTimerInterval = setInterval(updateSessionTimer, 1000);
                updateSessionTimer();
                updateSessionStatsDisplay();
                await startScreenCapture();

                // Capture initial screenshot
                captureAndUploadScreenshot(); 
            } catch (error) {
                console.error('Error starting session:', error);
                alert('Error starting session: ' + error.message);
            }
        }

        async function stopSession() {
            if (!currentSession) return;
            endSessionNotesContainer.classList.remove('hidden');
            stopSessionButton.classList.add('hidden'); // Hide original stop button
        }

async function confirmStopSession() {

    if (!currentSession) return;

    const notes = endSessionNotes.value.trim();

    try {

        await apiFetch('/stop-session', 'POST', {
            session_id: currentSession.id,
            notes
        });

        // STOP ALL INTERVALS
        clearInterval(sessionTimerInterval);

        clearInterval(activityTrackerInterval);

        clearTimeout(screenshotInterval);

        // STOP SCREEN SHARING
        if (mediaStream) {

            mediaStream.getTracks().forEach(track => track.stop());

            mediaStream = null;
        }

        currentSession = null;

        fetchDashboardData();

        endSessionNotesContainer.classList.add('hidden');

        endSessionNotes.value = '';

        startSessionButton.classList.remove('hidden');

        stopSessionButton.classList.add('hidden');

        console.log('Session stopped successfully.');

    } catch (error) {

        console.error('Error stopping session:', error);

        alert('Error stopping session: ' + error.message);
    }
}

                let data;
                if (taskId) {

                } else {
                    data = await apiFetch('/tasks', 'POST', { user_id: currentUser.id, title });
                }
                newTaskInput.value = '';
                fetchDashboardData(); // Refresh tasks

                console.error('Error adding/updating task:', error);

        async function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            try {
                await apiFetch(`/tasks/${taskId}`, 'DELETE');
                fetchDashboardData(); // Refresh tasks
            } catch (error) {
                console.error('Error deleting task:', error);
                alert('Error deleting task: ' + error.message);
            }
        }

        function renderTaskList(tasks) {
            taskList.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'py-3 flex items-center justify-between';
                li.innerHTML = `
                    <div class="flex items-center">
                        <input type="checkbox" data-task-id="${task.id}" ${task.completed ? 'checked' : ''} class="form-checkbox h-5 w-5 text-blue-600">
                        <span class="ml-3 text-lg ${task.completed ? 'line-through text-gray-500' : 'text-gray-900'}">${task.title}</span>
                    </div>
                    <button data-task-id="${task.id}" class="delete-task-button bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-2 rounded text-sm">Delete</button>
                `;
                taskList.appendChild(li);
            });

            // Add event listeners for checkboxes and delete buttons
            taskList.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const taskId = e.target.dataset.taskId;
                    addOrUpdateTask(null, taskId, e.target.checked);
                });
            });
            taskList.querySelectorAll('.delete-task-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    const taskId = e.target.dataset.taskId;
                    deleteTask(taskId);
                });
            });
        }

        // Activity Tracking
function startActivityTracking() {

    // Clear old interval first
    if (activityTrackerInterval) {
        clearInterval(activityTrackerInterval);
    }

    // Remove old listener first
    document.removeEventListener('mousemove', recordActivity);

    // Add fresh listener
    document.addEventListener('mousemove', recordActivity);

    // Start fresh interval
    activityTrackerInterval = setInterval(async () => {

        if (currentSession) {
            await sendActivityPing();
        }

    }, 30000);

    console.log('Activity tracking started.');
}

        function recordActivity() {
            lastActivityTime = Date.now();
            if (!isActive) {
                isActive = true;
                activityStatusSpan.textContent = 'Active';
                activityIndicator.classList.remove('idle');
                activityIndicator.classList.add('active');
            }
        }

        async function sendActivityPing() {
            if (!currentSession) return;

            const now = Date.now();
            const idleThreshold = 2 * 60 * 1000; // 2 minutes in milliseconds

            if (now - lastActivityTime > idleThreshold) {
                isActive = false;
                activityStatusSpan.textContent = 'Idle';
                activityIndicator.classList.remove('active');
                activityIndicator.classList.add('idle');
            } else {
                isActive = true;
                activityStatusSpan.textContent = 'Active';
                activityIndicator.classList.remove('idle');
                activityIndicator.classList.add('active');
            }

            try {
                const duration = 30; // Assuming ping every 10 seconds
                const data = await apiFetch('/activity-ping', 'POST', {
                    session_id: currentSession.id,
                    is_active: isActive,
                    duration: duration
                });
                currentSession = data; // Update session with latest active/idle times
                updateSessionStatsDisplay();
            } catch (error) {
                console.error('Error sending activity ping:', error);
            }
        }

async function startScreenCapture() {

    console.log('startScreenCapture called.');

    if (mediaStream) {
        console.log('Media stream already active.');
        return;
    }

    try {

mediaStream = await navigator.mediaDevices.getDisplayMedia({
    video: {
        displaySurface: "monitor"
    },
    audio: false,
    preferCurrentTab: false,
    selfBrowserSurface: "exclude",
    surfaceSwitching: "exclude"
});

        console.log('Screen sharing started successfully.');

        const videoTrack = mediaStream.getVideoTracks()[0];

        videoTrack.onended = () => {
            console.log('Screen sharing stopped.');
            mediaStream = null;
        };

        scheduleScreenshot();

    } catch (err) {

        console.error('SCREEN CAPTURE ERROR:', err);

        alert(
            'Screen sharing failed:\n\n' + err.message
        );
    }
}

function scheduleScreenshot() {

    console.log('Scheduling next screenshot...');

    if (screenshotInterval) clearTimeout(screenshotInterval);

    const minMinutes = 15;
    const maxMinutes = 20;

    const randomInterval =
        (Math.floor(Math.random() * (maxMinutes - minMinutes + 1)) + minMinutes)
        * 60 * 1000;

    console.log(
        `Next screenshot scheduled in ${randomInterval / 1000 / 60} minutes.`
    );

    screenshotInterval = setTimeout(
        captureAndUploadScreenshot,
        randomInterval
    );
}

        async function captureAndUploadScreenshot() {
            console.log('captureAndUploadScreenshot called.');
            if (!mediaStream) {
                console.warn('Cannot capture screenshot: mediaStream is null. Attempting to restart screen capture.');
                await startScreenCapture(); // Try to restart screen capture
                if (!mediaStream) {
                    console.error('Failed to obtain mediaStream after retry. Cannot capture screenshot.');
                    scheduleScreenshot(); // Reschedule even if failed
                    return;
                }
            }
            if (!currentSession) {
                console.warn('Cannot capture screenshot: No active session.');
                scheduleScreenshot(); // Reschedule even if failed
                return;
            }

            const videoTrack = mediaStream.getVideoTracks()[0];
            if (!videoTrack) {
                console.error('No video track found in media stream. MediaStream tracks:', mediaStream.getTracks());
                scheduleScreenshot();
                return;
            }
            console.log('Video track found:', videoTrack);

            const imageCapture = new ImageCapture(videoTrack);
            try {
                console.log('Attempting to grab frame...');
                const bitmap = await imageCapture.grabFrame();
                console.log('Frame grabbed successfully. Bitmap dimensions:', bitmap.width, 'x', bitmap.height);
                screenshotCanvas.width = bitmap.width;
                screenshotCanvas.height = bitmap.height;
                screenshotContext.drawImage(bitmap, 0, 0);
                console.log('Bitmap drawn to canvas.');

                screenshotCanvas.toBlob(async (blob) => {
                    if (blob) {
                        console.log('Canvas converted to blob. Blob size:', blob.size, 'bytes. Type:', blob.type);
                        const formData = new FormData();
                        formData.append('session_id', currentSession.id);
                        formData.append('image', blob, `screenshot-${Date.now()}.jpeg`); // Changed to jpeg extension
                        console.log('FormData created with session_id and image.');
                        try {
                            const response = await apiFetch('/upload-screenshot', 'POST', formData);
                            console.log('Screenshot uploaded successfully:', response);
                            lastScreenshotImg.src = response.image;
                            lastScreenshotImg.classList.remove('hidden');
                            noScreenshotMessage.classList.add('hidden');
                        } catch (error) {
                            console.error('Error uploading screenshot via API:', error);
                        }
                    } else {
                        console.error('Failed to create blob from canvas.');
                    }
                    scheduleScreenshot(); // Schedule next screenshot
                }, 'image/jpeg', 0.8); // Use JPEG for smaller size
            } catch (error) {
                console.error('Error capturing frame or processing image:', error);
                scheduleScreenshot(); // Schedule next screenshot
            }
        }

        // Event Listeners
        loginButton.addEventListener('click', login);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        logoutButton.addEventListener('click', showLogin);
        adminReportButton.addEventListener('click', showAdminReport); // New
        backToDashboardButton.addEventListener('click', showDashboard); // New
        startSessionButton.addEventListener('click', startSession);
        stopSessionButton.addEventListener('click', stopSession);
        confirmStopSessionButton.addEventListener('click', confirmStopSession);
        addTaskButton.addEventListener('click', () => addOrUpdateTask(newTaskInput.value.trim()));

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                showDashboard();
            } else {
                showLogin();
            }
        });
    </script>
